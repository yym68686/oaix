services:
  postgres:
    image: postgres:16
    container_name: oaix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oaix_gateway}
      POSTGRES_USER: ${POSTGRES_USER:-oaix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oaix_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oaix-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-oaix}:${POSTGRES_PASSWORD:-oaix_password}@postgres:5432/${POSTGRES_DB:-oaix_gateway}
      SERVICE_API_KEYS: ${SERVICE_API_KEYS:-change-me}
      CODEX_BASE_URL: ${CODEX_BASE_URL:-}
      MAX_REQUEST_ACCOUNT_RETRIES: ${MAX_REQUEST_ACCOUNT_RETRIES:-100}
      PROXY_MAX_ACTIVE_RESPONSES: ${PROXY_MAX_ACTIVE_RESPONSES:-64}
      PROXY_QUEUE_TIMEOUT_SECONDS: ${PROXY_QUEUE_TIMEOUT_SECONDS:-1}
      TOKEN_POOL_SNAPSHOT_MAX_AGE_SECONDS: ${TOKEN_POOL_SNAPSHOT_MAX_AGE_SECONDS:-10}
      DEFAULT_USAGE_LIMIT_COOLDOWN_SECONDS: ${DEFAULT_USAGE_LIMIT_COOLDOWN_SECONDS:-300}
      COMPACT_SERVER_ERROR_COOLDOWN_SECONDS: ${COMPACT_SERVER_ERROR_COOLDOWN_SECONDS:-60}
      REQUEST_LOG_WRITE_CONCURRENCY: ${REQUEST_LOG_WRITE_CONCURRENCY:-2}
      REQUEST_LOG_WRITE_BATCH_SIZE: ${REQUEST_LOG_WRITE_BATCH_SIZE:-50}
      REQUEST_LOG_WRITE_QUEUE_MAX_SIZE: ${REQUEST_LOG_WRITE_QUEUE_MAX_SIZE:-2000}
      REQUEST_LOG_RETENTION_DAYS: ${REQUEST_LOG_RETENTION_DAYS:-30}
      REQUEST_LOG_CLEANUP_INTERVAL_SECONDS: ${REQUEST_LOG_CLEANUP_INTERVAL_SECONDS:-3600}
      ADMIN_REQUESTS_CACHE_TTL_SECONDS: ${ADMIN_REQUESTS_CACHE_TTL_SECONDS:-5}
      ADMIN_TOKEN_COUNTS_CACHE_TTL_SECONDS: ${ADMIN_TOKEN_COUNTS_CACHE_TTL_SECONDS:-2}
      IMPORT_JOB_MAX_CONCURRENCY: ${IMPORT_JOB_MAX_CONCURRENCY:-16}
      IMPORT_STAGING_INSERT_BATCH_SIZE: ${IMPORT_STAGING_INSERT_BATCH_SIZE:-1000}
      IMPORT_PUBLISH_BATCH_SIZE: ${IMPORT_PUBLISH_BATCH_SIZE:-20}
      IMPORT_PUBLISH_FLUSH_INTERVAL_SECONDS: ${IMPORT_PUBLISH_FLUSH_INTERVAL_SECONDS:-0.5}
      IMPORT_JOB_RESPECT_RESPONSE_TRAFFIC: ${IMPORT_JOB_RESPECT_RESPONSE_TRAFFIC:-false}
      IMPORT_RESPONSE_IDLE_GRACE_SECONDS: ${IMPORT_RESPONSE_IDLE_GRACE_SECONDS:-0.25}
      IMPORT_WAIT_TIMEOUT_SECONDS: ${IMPORT_WAIT_TIMEOUT_SECONDS:-30}
      IMAGE_UPLOAD_MAX_BYTES: ${IMAGE_UPLOAD_MAX_BYTES:-26214400}
      UPSTREAM_NON_STREAM_MAX_RESPONSE_BYTES: ${UPSTREAM_NON_STREAM_MAX_RESPONSE_BYTES:-67108864}
      STREAM_CAPTURE_MAX_BYTES: ${STREAM_CAPTURE_MAX_BYTES:-8388608}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HOST: 0.0.0.0
      PORT: 8000
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
