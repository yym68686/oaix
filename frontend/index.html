<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>oaix Key Console</title>
    <script>
      (() => {
        const key = "oaix.themePreference";
        const stored = localStorage.getItem(key);
        const preference = stored === "light" || stored === "dark" || stored === "auto" ? stored : "auto";
        const resolved =
          preference === "auto"
            ? matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : preference;
        document.documentElement.classList.toggle("dark", resolved === "dark");
        document.documentElement.dataset.themePreference = preference;
        window.__OAIX_WEB_VERSION__ = {
          hash: "__OAIX_WEB_VERSION_HASH__",
          time: "__OAIX_WEB_VERSION_TIME__"
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
